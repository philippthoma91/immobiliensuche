<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Archiv · Immobiliensuche</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>

:root{--bg:#07080a;--panel:#0d0f14;--card:#11141b;--card2:#151923;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.13);--text:#f7f8f8;--muted:#8d93a1;--soft:#cbd1dc;--accent:#7c83ff;--green:#4ade80;--blue:#60a5fa;--amber:#fbbf24;--pink:#fb7185;--radius:18px;--shadow:0 20px 60px rgba(0,0,0,.38)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 20% 0%,rgba(124,131,255,.18),transparent 32rem),radial-gradient(circle at 100% 10%,rgba(74,222,128,.08),transparent 28rem),var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-feature-settings:"cv01","ss03";line-height:1.45}.page{max-width:1240px;margin:0 auto;padding:28px 18px 56px}.hero{position:relative;overflow:hidden;border:1px solid var(--border);border-radius:28px;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.025));box-shadow:var(--shadow);padding:28px}.hero:after{content:"";position:absolute;inset:auto -15% -55% 35%;height:260px;background:radial-gradient(circle,rgba(124,131,255,.25),transparent 65%);pointer-events:none}.eyebrow{color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.14em;font-weight:700}.hero h1{margin:8px 0 8px;font-size:clamp(34px,6vw,68px);line-height:.96;letter-spacing:-.055em;font-weight:650}.hero p{margin:0;max-width:760px;color:var(--muted);font-size:15px}.stats{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-top:22px}.stat{border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.035);padding:13px 14px}.stat strong{display:block;font-size:22px;letter-spacing:-.04em}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 4px}.btn,.nav-link{border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.04);color:var(--soft);padding:9px 13px;font-size:12px;font-weight:650;text-decoration:none;cursor:pointer}.btn:hover,.nav-link:hover{border-color:var(--border2);background:rgba(255,255,255,.075);color:#fff}.btn.active{background:rgba(124,131,255,.18);border-color:rgba(124,131,255,.4);color:#fff}.note{margin:18px 0 28px;border:1px solid rgba(251,191,36,.2);background:rgba(251,191,36,.07);border-radius:16px;padding:12px 14px;color:#d7d0bd;font-size:12.5px}.note a{color:#facc15;text-decoration:none}.section-head{display:flex;align-items:end;justify-content:space-between;margin:30px 0 14px}.section-head p{margin:0 0 3px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.section-head h2{margin:0;font-size:24px;letter-spacing:-.04em}.section-head a{color:var(--muted);font-size:12px;text-decoration:none}.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(355px,1fr));gap:14px}.listing-card{position:relative;display:grid;grid-template-columns:128px 1fr;min-height:236px;border:1px solid var(--border);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));overflow:hidden;box-shadow:0 1px 0 rgba(255,255,255,.04) inset;transition:transform .18s ease,border-color .18s ease,background .18s ease}.listing-card:hover{transform:translateY(-2px);border-color:var(--border2);background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025))}.listing-card.karben{box-shadow:inset 3px 0 0 rgba(74,222,128,.7)}.listing-card.vilbel{box-shadow:inset 3px 0 0 rgba(96,165,250,.75)}.listing-card.hofheim{box-shadow:inset 3px 0 0 rgba(251,191,36,.75)}.thumb{background:#0b0d12;min-height:100%;border-right:1px solid var(--border)}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.placeholder{height:100%;display:flex;align-items:center;justify-content:center;color:#facc15;font-weight:800;letter-spacing:.08em;background:linear-gradient(135deg,#161923,#0d0f14)}.card-body{padding:14px 14px 12px;display:flex;flex-direction:column;gap:9px;min-width:0}.topline{display:flex;gap:8px;align-items:center;justify-content:space-between}.source,.city-chip{font-size:10px;border-radius:999px;padding:4px 8px;font-weight:750;letter-spacing:.045em;text-transform:uppercase;border:1px solid var(--border)}.city-chip{color:var(--muted);background:rgba(255,255,255,.035)}.src-is24{color:#9fb3ff;background:rgba(124,131,255,.13);border-color:rgba(124,131,255,.22)}.src-ka{color:#ff9aae;background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.23)}.src-imde{color:#86efac;background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.22)}.src-zvg{color:#facc15;background:rgba(250,204,21,.12);border-color:rgba(250,204,21,.25)}.listing-card h3{font-size:15px;line-height:1.25;margin:0;color:#f4f5f7;font-weight:650;letter-spacing:-.015em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.meta-row{display:flex;gap:6px;flex-wrap:wrap}.meta-row span{font-size:11px;color:var(--muted);border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.025);border-radius:999px;padding:3px 7px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:auto}.metric{border:1px solid rgba(255,255,255,.07);border-radius:12px;background:rgba(0,0,0,.16);padding:8px 9px;min-width:0}.metric span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}.metric strong{display:block;color:#fff;font-size:13px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.metric.price strong{color:#f7f8f8}.metric.brw{grid-column:1/-1;background:linear-gradient(135deg,rgba(250,204,21,.12),rgba(250,204,21,.045));border-color:rgba(250,204,21,.23)}.metric.brw strong{color:#facc15}.actions{display:flex;align-items:center;justify-content:space-between;padding-top:2px}.offer-link{display:inline-flex;align-items:center;justify-content:center;width:100%;border-radius:12px;text-decoration:none;color:#fff;background:rgba(124,131,255,.16);border:1px solid rgba(124,131,255,.28);padding:9px 10px;font-size:12px;font-weight:750}.offer-link:hover{background:rgba(124,131,255,.26)}.offer-link.ka{background:rgba(251,113,133,.14);border-color:rgba(251,113,133,.25)}.offer-link.imde{background:rgba(74,222,128,.13);border-color:rgba(74,222,128,.24)}.offer-link.zvg{background:rgba(250,204,21,.13);border-color:rgba(250,204,21,.25);color:#facc15}.read-btn{position:absolute;top:10px;right:10px;z-index:5;width:30px;height:30px;border-radius:999px;border:1px solid var(--border2);background:rgba(0,0,0,.55);color:var(--muted);backdrop-filter:blur(8px);cursor:pointer}.read-btn.checked{background:rgba(124,131,255,.28);color:#fff}.listing-card.read{opacity:.42;filter:grayscale(.65)}.broker-section{margin:44px 0 0}.broker-title{font-size:20px;font-weight:750;letter-spacing:-.03em;margin-bottom:14px}.broker-title small{font-size:12px;color:var(--muted);font-weight:500}.broker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:10px}.broker-card{border:1px solid var(--border)!important;border-radius:16px!important;background:rgba(255,255,255,.035)!important;padding:13px!important;min-height:130px!important}.broker-card:hover{transform:translateY(-2px);border-color:var(--border2)!important}.broker-head{display:flex;justify-content:space-between;gap:8px}.broker-name{font-weight:750}.broker-seat{font-size:10px;color:#c4b5fd}.broker-detail,.broker-focus,.broker-note{color:var(--muted);font-size:12px}.broker-link{color:#aeb4ff;font-size:12px;font-weight:700}.footer{margin:36px 0 0;color:var(--muted);font-size:12px;text-align:center}.footer a{color:var(--accent)}@media(max-width:820px){.stats{grid-template-columns:repeat(3,1fr)}.cards-grid{grid-template-columns:1fr}.listing-card{grid-template-columns:112px 1fr}.hero{padding:22px}.metric strong{font-size:12px}}@media(max-width:520px){.page{padding:14px 10px 34px}.stats{grid-template-columns:repeat(2,1fr)}.listing-card{grid-template-columns:1fr}.thumb{height:160px;border-right:0;border-bottom:1px solid var(--border)}.metrics{grid-template-columns:repeat(2,1fr)}}

.archive-btn{border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.03);color:var(--muted);font-size:14px;cursor:pointer;padding:4px 8px;transition:all .2s;position:absolute;top:10px;right:10px;z-index:2}.archive-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,131,255,.1)}.listing-card{position:relative;transition:all .4s ease}.listing-card.archived{opacity:.25;filter:grayscale(1)}.listing-card.archived:hover{opacity:.6;filter:grayscale(.5)}.listing-card.archived .archive-btn{color:var(--green);border-color:rgba(74,222,128,.4)}
</style></head>
<body><main class="page">
<header class="hero">
  <div class="eyebrow">Immobilien Radar Rhein-Main</div>
  <h1>Archiv</h1>
  <p>Archivierte Anzeigen. ✅ holt sie zurück in die aktive Liste.</p>
  <div class="stats">
    <div class="stat" id="stat-total"><strong>0</strong><span>Archiv</span></div>
  </div>
  <div class="toolbar">
    <a class="nav-link" href="index.html">Zur Suche</a>
  </div>
</header>
<section class="city-section">
  <div class="cards-grid" id="archive-grid"></div>
</section>
<footer class="footer"><a href="index.html">Zurück</a></footer>
</main>
<script>
const GH_REPO='philippthoma91/immobiliensuche';
const GH_BRANCH='master';
let archivedIds=new Set();
let allEntries=[];

function getToken(){
 let t=localStorage.getItem('gh_token');
 if(!t){
  t=prompt('GitHub Token (einmalig):','ghp_...');
  if(t)localStorage.setItem('gh_token',t);
 }
 return t;
}

async function init(){
 const er=await fetch('entries.json');
 allEntries=await er.json();
 try{
  const r=await fetch('archived.json?t='+Date.now());
  const d=await r.json();
  if(d.archived)d.archived.forEach(id=>archivedIds.add(id));
 }catch(e){}
 renderArchived();
}

function renderArchived(){
 const grid=document.getElementById('archive-grid');
 const archived=allEntries.filter(e=>archivedIds.has(e.id||String(e.adid||'')));
 if(archived.length===0){grid.innerHTML='<p style="color:var(--muted);padding:40px;text-align:center">Keine archivierten Anzeigen.</p>';return;}
 grid.innerHTML=archived.map(e=>{
  const eid=e.id||String(e.adid||''),title=e.titel||'?',price=e.preis||'?',area=e.wohnflaeche||e.flaeche||'?',rooms=e.zimmer||'?',link=e.link||'#',img=e.img||'';
  return '<article class="listing-card" style="position:relative;opacity:1;filter:none"><button class="archive-btn" onclick="restore(\''+eid+'\',this)" style="color:var(--green)">✅</button><div class="thumb">'+(img?'<img src="'+img+'" loading="lazy">':'<div class="placeholder">ZVG</div>')+'</div><div class="card-body"><h3>'+title+'</h3><div class="metrics"><div class="metric price"><span>Preis</span><strong>'+price+' €</strong></div><div class="metric"><span>Fläche</span><strong>'+area+'</strong></div><div class="metric"><span>Zimmer</span><strong>'+rooms+'</strong></div></div><div class="actions"><a href="'+link+'" target="_blank" class="offer-link">Exposé öffnen</a></div></div></article>';
 }.join(''));
 document.querySelector('#stat-total strong').textContent=archived.length;
}

async function getFileSha(token){
 const r=await fetch('https://api.github.com/repos/'+GH_REPO+'/contents/archived.json?ref='+GH_BRANCH,{headers:{Authorization:'token '+token}});
 if(r.ok){const d=await r.json();return d.sha;}
 return null;
}

async function restore(id,btn){
 const token=getToken();
 if(!token)return;
 archivedIds.delete(id);
 localStorage.setItem('immo_archived',JSON.stringify([...archivedIds]));
 try{
  const sha=await getFileSha(token);
  const data={archived:[...archivedIds],last_updated:new Date().toISOString().split('T')[0]};
  const content=JSON.stringify(data,null,2);
  await fetch('https://api.github.com/repos/'+GH_REPO+'/contents/archived.json',{
   method:'PUT',
   headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
   body:JSON.stringify({message:'Restore: '+id,content:btoa(unescape(encodeURIComponent(content))),sha:sha||undefined,branch:GH_BRANCH})
  });
 }catch(e){}
 renderArchived();
}

init();
</script></body></html>
